<app-left-nav></app-left-nav>
<app-up-nav></app-up-nav>

<div class="content">
  <div class="container-fluid pt-4 px-4">
    <div class="bg-secondary text-center rounded p-4">

      <!-- En-tête avec recherche -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <h6 class="mb-0">Liste des Formateurs</h6>
        <mat-form-field>
          <mat-label>Filtrer</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Nom ou email">
        </mat-form-field>
      </div>

      <!-- Tableau Material -->
      <div class="table-responsive">
        <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 table">

          <!-- Colonne Index -->
          <ng-container matColumnDef="index">
            <th mat-header-cell *matHeaderCellDef> # </th>
            <td mat-cell *matCellDef="let user; let i = index">
              {{ (paginator?.pageIndex || 0) * (paginator?.pageSize || 10) + i + 1 }}
            </td>
          </ng-container>

          <!-- Colonne Nom -->
          <ng-container matColumnDef="nom">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Nom </th>
            <td mat-cell *matCellDef="let user"> {{ user.nom }} </td>
          </ng-container>

          <!-- Colonne Email -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
            <td mat-cell *matCellDef="let user"> {{ user.email }} </td>
          </ng-container>

          <!-- Colonne CV -->
          <ng-container matColumnDef="cv">
            <th mat-header-cell *matHeaderCellDef> CV </th>
            <td mat-cell *matCellDef="let user">
              <a *ngIf="user.cvPath" [href]="getPdfUrl(user)" target="_blank" download>
                Télécharger CV
              </a>
            </td>
          </ng-container>

          <!-- En-têtes et lignes -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

          <!-- Aucune donnée -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length" class="text-center text-muted">
              Aucun formateur correspondant
            </td>
          </tr>
        </table>
      </div>

      <!-- Pagination -->
      <mat-paginator [pageSizeOptions]="[5, 10, 25, 50]" aria-label="Sélectionner la page" showFirstLastButtons>
      </mat-paginator>

    </div>
  </div>
</div>
