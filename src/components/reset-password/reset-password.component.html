<div class="container-fluid position-relative d-flex p-0">
  <div class="container-fluid">
    <div class="row h-100 align-items-center justify-content-center" style="min-height: 100vh;">
      <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
        <div class="bg-secondary rounded p-4 p-sm-5 my-4 mx-3">

          <div class="d-flex align-items-center justify-content-between mb-3">
            <h3 class="text-primary">
              <i class="fa fa-key me-2"></i>Réinitialiser le mot de passe
            </h3>
          </div>

          <p class="text-muted mb-4">
            Entrez le code reçu par email et votre nouveau mot de passe.
          </p>

          <!-- Email (readonly) -->
          <div class="form-floating mb-3">
            <input
              type="email"
              class="form-control"
              [(ngModel)]="email"
              name="email"
              readonly
            >
            <label>Adresse email</label>
          </div>

          <!-- Code -->
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              [(ngModel)]="code"
              name="code"
              required
              maxlength="6"
              placeholder="Code"
            >
            <label>Code de vérification (6 chiffres)</label>
          </div>

          <!-- New Password -->
          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control"
              [(ngModel)]="newPassword"
              name="newPassword"
              required
              placeholder="Nouveau mot de passe"
            >
            <label>Nouveau mot de passe</label>
          </div>

          <!-- Confirm Password -->
          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              required
              placeholder="Confirmer"
            >
            <label>Confirmer le mot de passe</label>
          </div>

          <!-- Messages -->
          <div *ngIf="successMessage" class="alert alert-success">
            {{ successMessage }}
          </div>
          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <!-- Button -->
          <button
            class="btn btn-primary py-3 w-100 mb-4"
            (click)="resetPassword()"
            [disabled]="loading || !code || !newPassword || !confirmPassword"
          >
            <span *ngIf="!loading">Réinitialiser le mot de passe</span>
            <span *ngIf="loading">En cours...</span>
          </button>

          <p class="text-center mb-0">
            <a routerLink="/login">Retour à la connexion</a>
          </p>

        </div>
      </div>
    </div>
  </div>
</div>
